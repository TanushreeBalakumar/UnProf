<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnProf Intern Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="profile-card">

        <div class="profile-image">
            <img src="profile.jpg" alt="Profile Photo">
        </div>

        <h2>Tanushree</h2>
        <h4>Web development Intern</h4>

        <p class="location">📍 Chennai, Tamil Nadu</p>

        <div class="skills">
            <span>HTML</span>
            <span>CSS</span>
            <span>JavaScript</span>
            <span>React</span>
        </div>

        <div class="about">
            <h3>About</h3>
            <p>
                Passionate Web Development Intern with a strong interest in building responsive and user-friendly websites. Eager to learn modern web technologies and contribute to impactful projects.
            </p>
        </div>

        <button>Contact Intern</button>

    </div>

</body>
</html>
