<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management Console</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <h1>🎓 Student Management Console</h1>

    <div class="dashboard">
        <div class="card">
            <h2 id="totalStudents">0</h2>
            <p>Total Students</p>
        </div>

        <div class="card">
            <h2 id="averageMarks">0</h2>
            <p>Average Marks</p>
        </div>

        <div class="card">
            <h2 id="passCount">0</h2>
            <p>Passed</p>
        </div>

        <div class="card">
            <h2 id="failCount">0</h2>
            <p>Failed</p>
        </div>
    </div>

    <div class="form-section">
        <input type="text" id="name" placeholder="Student Name">

        <input type="number" id="marks" placeholder="Marks">

        <button onclick="addStudent()">Add Student</button>
    </div>

    <div class="search-box">
        <input
            type="text"
            id="search"
            placeholder="Search Student..."
            onkeyup="displayStudents()">
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Marks</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="studentTable"></tbody>
    </table>

</div>

<script src="script.js"></script>

</body>
</html>
